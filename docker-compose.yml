services:
  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_DATABASE: sdvpro
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  app:
    build: .
    restart: always
    ports:
      - "3333:3333"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=sdvpro
      - PORT=3333
    depends_on:
      - db
